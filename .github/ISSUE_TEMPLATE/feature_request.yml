name: Feature request
description: Suggest a new section, API, or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you want and why. If possible, suggest an API or schema.
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      placeholder: "I want to do X to achieve Y (e.g. add a team section, or support dark mode from config)."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: Describe how you’d like the API/config or component to work (optionally with sample JSON or code).
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Other approaches you’ve thought about (if any).
    validations:
      required: false
  - type: dropdown
    id: package
    attributes:
      label: Related package (if known)
      options:
        - "@landing/core (types/schema)"
        - "@landing/components (UI)"
        - "@landing/next (Next adapter)"
        - "Unknown / multiple packages"
    validations:
      required: false
